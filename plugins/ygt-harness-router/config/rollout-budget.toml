# Opt-in Codex configuration template for ygt-harness-router.
# This file is not auto-loaded by the plugin. Copy its settings deliberately after
# a canary and five comparable workload samples; never paste secrets here.

[features.rollout_budget]
enabled = false
# Set a positive limit only after choosing a workload-specific budget.
limit_tokens = 30000000
reminder_interval_tokens = 3000000
prefill_token_weight = 1.0
sampling_token_weight = 1.0
